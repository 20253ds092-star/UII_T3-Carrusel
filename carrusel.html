<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
</head>
<body>
<img width="200" id="img" src="img/3.jpg">
<button type="button" id="Anterior"><-----</button>
<button type="button" id="siguiente">-----></button>

<script>
    let  indice =0;
    let imagenes =["img/3.jpg","img/4.jpg","img/6.jpg","img/1.jpg","img/images.jpg"];
    document.getElementById("siguiente").addEventListener("click",() => {
        if (indice<5){
            indice++;
        }
        document.getElementById("img").setAttribute("src",imagenes[indice]);
    });
    document.getElementById("Anterior").addEventListener("click",() => {
        if (indice>0){
            indice--;
        }
        document.getElementById("img").setAttribute("src",imagenes[indice]);
    });
</script>

</body>
</html>
